<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users</title>
</head>
<body>

    <h1>All Users</h1>

    {% for user in users %}

        <div style="border:1px solid black; padding:15px; margin:20px; width:300px;">

            <img src="{{ user.profile_img.url }}" alt="Profile Image" width="150" height="150">

            <h3>Name : {{ user.name }}</h3>

            <p><strong>Email :</strong> {{ user.email }}</p>

            <p><strong>Phone :</strong> {{ user.phone }}</p>

            <p><strong>Address :</strong> {{ user.address }}</p>

        </div>

    {% empty %}

        <h2>No Users Found</h2>

    {% endfor %}

</body>
</html>
